name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare Pages artifact
        shell: bash
        run: |
          # Ensure output dir exists
          mkdir -p dist

          # If Vite produced client assets under dist/client/assets, copy them to dist/assets
          if [ -d "dist/client/assets" ]; then
            cp -r dist/client/assets dist/assets
          fi

          # Find CSS and JS entry files
          CSS_FILE=$(ls dist/assets/*.css 2>/dev/null | head -n1 | xargs -n1 basename || true)
          JS_FILES=$(ls dist/assets/index-*.js 2>/dev/null || true)

          # Create a minimal index.html referencing the built assets
          cat > dist/index.html <<HTML
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1" />
              %CSS_PLACEHOLDER%
            </head>
            <body>
              <div id="root"></div>
              %JS_PLACEHOLDER%
            </body>
          </html>
          HTML

          if [ -n "$CSS_FILE" ]; then
            sed -i "s|%CSS_PLACEHOLDER%|<link rel='stylesheet' href='./assets/$CSS_FILE'>|" dist/index.html
          else
            sed -i "s|%CSS_PLACEHOLDER%||" dist/index.html
          fi

          # Inject JS script tags
          if [ -n "$JS_FILES" ]; then
            JS_TAGS=""
            for f in $JS_FILES; do
              JS_TAGS+="<script type=\"module\" src=\"./assets/$(basename $f)\"></script>\n"
            done
            sed -i "s|%JS_PLACEHOLDER%|$JS_TAGS|" dist/index.html
          else
            sed -i "s|%JS_PLACEHOLDER%||" dist/index.html
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
